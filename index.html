<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiller Lookup - SuperAwesome</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.minecraft.net/content/dam/community/fy23/minecraft-live-assets/hero-image.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
        }
        
        .lookup-container { 
            background: rgba(30, 30, 30, 0.85); 
            backdrop-filter: blur(10px);
            max-width: 500px; 
            margin: 0 auto; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        h1 { color: #f39c12; margin-bottom: 20px; }
        
        input { 
            padding: 14px; width: 60%; border-radius: 10px; border: 1px solid #444; 
            background: #222; color: white; margin-right: 10px; outline: none;
        }
        
        button { 
            padding: 14px 25px; background: #f39c12; border: none; color: white; 
            cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s;
        }
        
        button:hover { background: #e67e22; transform: translateY(-2px); }
        
        #result { 
            margin-top: 30px; text-align: left; 
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .info-row { 
            margin: 10px 0; padding: 12px; background: rgba(255,255,255,0.05); 
            border-radius: 8px; border-left: 4px solid #f39c12;
        }
        
        .status-online { color: #2ecc71; font-weight: bold; }
        .status-offline { color: #ff6b6b; font-weight: bold; }
        .text-muted { color: #aaa; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="lookup-container">
        <h1>Spiller Lookup</h1>
        <p>Søg efter en spiller på SuperAwesome</p>
        
        <input type="text" id="username" placeholder="Indtast spillernavn...">
        <button onclick="lookupPlayer()">Søg</button>

        <div id="result"></div>
    </div>

    <script>
        const inputField = document.getElementById("username");

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                lookupPlayer();
            }
        });

        async function lookupPlayer() {
            const user = inputField.value;
            const resDiv = document.getElementById('result');
            
            if(!user) {
                resDiv.innerHTML = "Indtast venligst et navn.";
                return;
            }

            resDiv.innerHTML = "Henter data...";

            try {
                const response = await fetch(`https://api.superawesome.dk/players/${user}`);
                const data = await response.json();

                if (data.username) {
                    let statusDisplay = data.status === 'online' 
                        ? `<span class="status-online">Online (spiller på ${data.currentServer})</span>` 
                        : `<span class="status-offline">Offline</span>`;

                    let htmlContent = `
                        <div class="info-row"><b>Navn:</b> ${data.username}</div>
                        <div class="info-row"><b>UUID:</b> ${data.uuid}</div>
                        <div class="info-row"><b>Status:</b> ${statusDisplay}</div>
                    `;

                    if (data.status !== 'online') {
                        const lastSeenDate = new Date(data.lastSeen);
                        const now = new Date();
                        const diffMs = now - lastSeenDate;
                        const diffSeconds = Math.floor(diffMs / 1000);
                        const diffMinutes = Math.floor(diffSeconds / 60);
                        const diffHours = Math.floor(diffMinutes / 60);
                        const diffDays = Math.floor(diffHours / 24);

                        let timeAgo = "";
                        if (diffDays > 0) timeAgo = `${diffDays} dage siden`;
                        else if (diffHours > 0) timeAgo = `${diffHours} timer siden`;
                        else if (diffMinutes > 0) timeAgo = `${diffMinutes} minutter siden`;
                        else timeAgo = `${diffSeconds} sekunder siden`;

                        const formattedDate = lastSeenDate.toLocaleString('da-DK', {
                            day: '2-digit', month: '2-digit', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                        
                        htmlContent += `<div class="info-row"><b>Sidst online:</b> ${formattedDate} (${timeAgo})</div>`;
                    }

                    htmlContent += `
                        <div class="info-row"><b>Lobbypoints:</b> ${data.lobbyPoints.toLocaleString()}</div>
                        <div class="info-row"><b>Spillerpoints:</b> ${data.playerPoints.toLocaleString()}</div>
                    `;

                    // Rank/VIP info
                    if (data.proDays !== null && data.proDays > 0) {
                        htmlContent += `<div class="info-row"><b>Pro Dage tilbage:</b> ${data.proDays}</div>`;
                    } else if (data.vipDays !== null && data.vipDays > 0) {
                        htmlContent += `<div class="info-row"><b>VIP Dage tilbage:</b> ${data.vipDays}</div>`;
                    }

                    // Lobby adgang
                    let uniqueAccess = data.lobbyAccess ? [...new Set(data.lobbyAccess)] : [];
                    if (uniqueAccess.length > 0) {
                        htmlContent += `<div class="info-row"><b>Lobby adgang:</b> ${uniqueAccess.join(", ")}</div>`;
                    }

                    // Discord - ALTID TJEK FOR LINK
                    if (data.discordID) {
                        htmlContent += `<div class="info-row"><b>Discord ID:</b> ${data.discordID}</div>`;
                    }

                    // "Ikke fundet" beskeder til sidst
                    if (!data.discordID) {
                        htmlContent += `<div class="info-row text-muted">Spilleren har ikke linked nogen discord konti endnu.</div>`;
                    }
                    if (uniqueAccess.length === 0) {
                        htmlContent += `<div class="info-row text-muted">Spilleren har ikke købt adgang til nogen lobbyer endnu.</div>`;
                    }

                    resDiv.innerHTML = htmlContent;
                } else {
                    resDiv.innerHTML = "Kunne ikke finde spilleren.";
                }
            } catch (error) {
                resDiv.innerHTML = "Fejl: Kunne ikke forbinde til API'et.";
            }
        }
    </script>
</body>
</html>
